app = "your-headscale-app"
primary_region = "ams"
kill_signal = "SIGINT"
kill_timeout = 5

[processes]
app = "headscale serve"
route_approver = "/usr/local/bin/cron-approve-routes.sh"

[metrics]
port = 9090
path = "/metrics"

[env]
  GATEWAY_TAG = "tag:gateway"
  APPROVE_ROUTES_INTERVAL_SECONDS = "300"
  HEADSCALE_URL = "https://your-headscale-app.fly.dev"

[experimental]
  auto_rollback = true

[[services]]
  internal_port = 8080
  processes = ["app"]
  protocol = "tcp"
  [services.concurrency]
    hard_limit = 25
    soft_limit = 20
    type = "connections"

  [[services.ports]]
    force_https = true
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.tcp_checks]]
    grace_period = "1s"
    interval = "15s"
    restart_limit = 0
    timeout = "2s"

[mounts]
source = "headscale_data"
destination = "/data"
